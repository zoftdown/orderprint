<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OrderPrint — ใบออร์เดอร์เสื้อ</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--surface:#181818;--surface2:#222;--border:#2c2c2c;
  --text:#f0ede8;--muted:#777;--accent:#f59e0b;--accent2:rgba(245,158,11,.12);
  --danger:#ef4444;--success:#22c55e;--info:#60a5fa;
  --r:12px;--r-sm:8px;--r-xs:6px;
}
body{font-family:'Segoe UI',-apple-system,'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
input,textarea,select{font-family:inherit;font-size:15px;}
button{cursor:pointer;font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(245,158,11,.4);z-index:100;}
@media print{
  .no-print{display:none!important;}
  .print-only{display:block!important;}
  body{background:#fff!important;color:#000!important;}
  @page{margin:10mm;}
}
.print-only{display:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const SIZES = ['XS','SS','S','M','L','XL','2XL','3XL','4XL'];
const FABRIC_OPTS = ['100แกรม','110แกรม','120แกรม','130แกรม','150แกรม','180แกรม'];
const COLOR_SWATCHES = ['ฟ้า','แดง','เขียว','ดำ','ขาว','เหลือง','ส้ม','ม่วง','ชมพู','น้ำเงิน','เทา'];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function todayTH(){
  const d=new Date();
  const y=(d.getFullYear()+543)%100;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(y).padStart(2,'0')}`;
}

function newColor(){
  return{id:uid(),name:'',image:null,sizes:Object.fromEntries(SIZES.map(s=>[s,'']))};
}
function newOrder(){
  return{id:uid(),shopName:'ช่างแม็ก โมดิฟาย',workerName:'',date:todayTH(),sleeveType:'แขนยาว',fabric:'120แกรม',totalPrice:'',deposit:'',notes:'',colors:[newColor()],createdAt:Date.now()};
}
async function compressImg(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const MAX=480;let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',.72));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function saveLS(orders){try{localStorage.setItem('op_orders',JSON.stringify(orders));}catch(e){}}
function loadLS(){try{return JSON.parse(localStorage.getItem('op_orders'))||[];}catch{return[];}}
function fmtNum(n){return Number(n||0).toLocaleString('th-TH');}
function totalShirts(order){return order.colors.reduce((s,c)=>s+SIZES.reduce((s2,sz)=>s2+(parseInt(c.sizes[sz])||0),0),0);}
function balance(order){return(parseFloat(order.totalPrice)||0)-(parseFloat(order.deposit)||0);}

/* ───── ORDER CARD (print layout) ───── */
function OrderCard({order}){
  const total=totalShirts(order);
  const bal=balance(order);
  const showSizes=(color)=>SIZES.filter(s=>parseInt(color.sizes[s])>0);
  return(
    <div style={{background:'#fff',color:'#111',fontFamily:"'Segoe UI','Noto Sans Thai',sans-serif",padding:'14px 16px',maxWidth:520,margin:'0 auto',border:'1px solid #ddd'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div style={{fontWeight:700,fontSize:13}}>คนงาน {order.workerName||'—'}</div>
          <div style={{fontSize:12,marginTop:2}}>ช่างแม็ก โมดิฟาย</div>
        </div>
        <div style={{textAlign:'right',fontSize:12,lineHeight:1.7}}>
          <div>ยอด<strong style={{color:'#1a56db'}}>{fmtNum(order.totalPrice)}</strong>บาท</div>
          <div>มัดจำ<strong style={{color:'#e02424'}}>{fmtNum(order.deposit)}</strong>บาท</div>
          <div>เหลือยอด<strong style={{color:'#057a55'}}>{fmtNum(bal)}</strong>บาท</div>
        </div>
      </div>
      <div style={{display:'flex',gap:20,fontSize:12,marginBottom:8,borderBottom:'1px solid #e5e7eb',paddingBottom:8}}>
        <div><span style={{color:'#6b7280'}}>วันที่พิมพ์ </span><strong>{order.date}</strong></div>
        <div><span style={{color:'#6b7280'}}>ประเภท </span><strong>{order.sleeveType} {order.fabric}</strong></div>
        {order.shopName&&<div><strong>{order.shopName}</strong></div>}
      </div>
      {/* Colors */}
      {order.colors.map((c,i)=>{
        const activeSizes=showSizes(c);
        return(
          <div key={c.id} style={{display:'grid',gridTemplateColumns:c.image?'90px 1fr':'1fr',gap:10,marginBottom:10,paddingBottom:10,borderBottom:i<order.colors.length-1?'1px solid #f0f0f0':'none'}}>
            {c.image&&<img src={c.image} alt={c.name} style={{width:90,height:90,objectFit:'contain',border:'1px solid #e5e7eb',borderRadius:6}}/>}
            <div>
              {c.name&&<div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{c.name}</div>}
              <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{order.sleeveType}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'4px 10px',fontSize:13}}>
                {activeSizes.length>0
                  ?activeSizes.map(s=><span key={s}><strong>{s}</strong>={c.sizes[s]}</span>)
                  :<span style={{color:'#6b7280',fontSize:12}}>ยังไม่ได้กรอกไซส์</span>}
              </div>
            </div>
          </div>
        );
      })}
      {/* Footer */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4,fontSize:12}}>
        {order.notes?<div style={{color:'#4b5563',fontSize:11,maxWidth:'70%'}}>หมายเหตุ: {order.notes}</div>:<div/>}
        <div style={{fontWeight:800,fontSize:15}}>{total} ตัว</div>
      </div>
    </div>
  );
}

/* ───── NAV ───── */
function Nav({page,setPage,ordersLen}){
  const s={
    nav:{background:'#111',borderBottom:'1px solid #2a2a2a',padding:'0 16px',position:'sticky',top:0,zIndex:50,display:'flex',alignItems:'center',justifyContent:'space-between',height:52,flexShrink:0},
    logo:{fontWeight:800,fontSize:17,color:'#f59e0b',letterSpacing:'-0.5px'},
    tabs:{display:'flex',gap:4},
    tab:{padding:'6px 14px',borderRadius:6,border:'none',background:'transparent',color:'#888',fontSize:14,fontWeight:500},
    active:{background:'rgba(245,158,11,.15)',color:'#f59e0b'},
  };
  return(
    <nav style={s.nav} className="no-print">
      <div style={s.logo}>🖨 OrderPrint</div>
      <div style={s.tabs}>
        <button style={{...s.tab,...(page==='form'||page==='preview'?s.active:{})}} onClick={()=>setPage('form')}>+ สร้าง</button>
        <button style={{...s.tab,...(page==='history'?s.active:{})}} onClick={()=>setPage('history')}>
          ประวัติ{ordersLen>0?` (${ordersLen})`:''}
        </button>
      </div>
    </nav>
  );
}

/* ───── FORM ───── */
function Field({label,children,hint}){
  return(
    <div style={{marginBottom:14}}>
      <label style={{display:'block',fontSize:12,color:'#888',marginBottom:5,fontWeight:500}}>{label}</label>
      {children}
      {hint&&<div style={{fontSize:11,color:'#666',marginTop:3}}>{hint}</div>}
    </div>
  );
}
const inputStyle={width:'100%',background:'#1e1e1e',border:'1px solid #2e2e2e',borderRadius:8,padding:'10px 12px',color:'#f0ede8',outline:'none',fontSize:15};
const btnStyle=(variant='default')=>({
  default:{padding:'10px 18px',borderRadius:8,border:'1px solid #333',background:'#222',color:'#ddd',fontSize:14,fontWeight:500},
  accent:{padding:'12px 24px',borderRadius:10,border:'none',background:'#f59e0b',color:'#000',fontSize:15,fontWeight:700,width:'100%'},
  ghost:{padding:'8px 14px',borderRadius:7,border:'1px solid #2a2a2a',background:'transparent',color:'#888',fontSize:13},
  danger:{padding:'8px 14px',borderRadius:7,border:'1px solid #3a1515',background:'transparent',color:'#ef4444',fontSize:13},
  info:{padding:'10px 18px',borderRadius:8,border:'1px solid #1e3a5f',background:'rgba(96,165,250,.1)',color:'#60a5fa',fontSize:14,fontWeight:500},
}[variant]);

function ColorCard({color,idx,onChange,onSizeChange,onImageUpload,onRemove,canRemove,sleeveType}){
  const fileRef=useRef();
  const activeSizes=SIZES.filter(s=>parseInt(color.sizes[s])>0);
  return(
    <div style={{background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:12,padding:'14px',marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:600,color:'#f59e0b'}}>สีที่ {idx+1}</span>
        {canRemove&&<button style={btnStyle('danger')} onClick={onRemove}>ลบ</button>}
      </div>
      {/* Color name */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input value={color.name} onChange={e=>onChange('name',e.target.value)} placeholder="ชื่อสี เช่น ฟ้า / แดง / เขียว" style={{...inputStyle,flex:1}}/>
      </div>
      {/* Swatches */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
        {COLOR_SWATCHES.map(sw=>(
          <button key={sw} onClick={()=>onChange('name',sw)} style={{padding:'4px 10px',borderRadius:20,border:color.name===sw?'1.5px solid #f59e0b':'1px solid #333',background:color.name===sw?'rgba(245,158,11,.15)':'transparent',color:color.name===sw?'#f59e0b':'#888',fontSize:12}}>{sw}</button>
        ))}
      </div>
      {/* Image upload */}
      <div style={{marginBottom:12}}>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{if(e.target.files[0])onImageUpload(await compressImg(e.target.files[0]));}}/>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {color.image
            ?<img src={color.image} alt="" style={{width:80,height:80,objectFit:'contain',border:'1px solid #333',borderRadius:8}}/>
            :<div style={{width:80,height:80,border:'1px dashed #333',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#555',fontSize:12,textAlign:'center',cursor:'pointer'}} onClick={()=>fileRef.current.click()}>อัปโหลด<br/>รูปเสื้อ</div>}
          <div>
            <button style={btnStyle('ghost')} onClick={()=>fileRef.current.click()}>📷 {color.image?'เปลี่ยนรูป':'อัปโหลดรูป'}</button>
            {color.image&&<button style={{...btnStyle('ghost'),marginTop:6,display:'block',color:'#ef4444',borderColor:'#3a1515'}} onClick={()=>onChange('image',null)}>ลบรูป</button>}
          </div>
        </div>
      </div>
      {/* Sizes */}
      <div style={{fontSize:12,color:'#888',marginBottom:8,fontWeight:500}}>{sleeveType} — กรอกจำนวนต่อไซส์</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
        {SIZES.map(sz=>(
          <div key={sz}>
            <div style={{fontSize:11,color:'#666',marginBottom:3,textAlign:'center'}}>{sz}</div>
            <input type="number" min="0" inputMode="numeric" value={color.sizes[sz]} onChange={e=>onSizeChange(sz,e.target.value)}
              style={{...inputStyle,textAlign:'center',padding:'8px 4px',fontSize:16}}/>
          </div>
        ))}
      </div>
      {activeSizes.length>0&&(
        <div style={{marginTop:10,padding:'8px 10px',background:'#111',borderRadius:7,fontSize:13,color:'#bbb'}}>
          {activeSizes.map(s=><span key={s} style={{marginRight:10}}><strong style={{color:'#f59e0b'}}>{s}</strong>={color.sizes[s]}</span>)}
          <span style={{color:'#666'}}>รวม {activeSizes.reduce((s,sz)=>s+(parseInt(color.sizes[sz])||0),0)} ตัว</span>
        </div>
      )}
    </div>
  );
}

function FormPage({order,setOrder,onSave,isEdit}){
  function setField(f,v){setOrder(o=>({...o,[f]:v}));}
  function setColorField(cid,f,v){setOrder(o=>({...o,colors:o.colors.map(c=>c.id===cid?{...c,[f]:v}:c)}));}
  function setSizeField(cid,sz,v){setOrder(o=>({...o,colors:o.colors.map(c=>c.id===cid?{...c,sizes:{...c.sizes,[sz]:v}}:c)}));}
  function addColor(){setOrder(o=>({...o,colors:[...o.colors,newColor()]}));}
  function removeColor(cid){setOrder(o=>({...o,colors:o.colors.filter(c=>c.id!==cid)}));}
  const tot=totalShirts(order);
  const bal=balance(order);
  return(
    <div style={{padding:'16px',maxWidth:600,margin:'0 auto'}} className="no-print">
      <div style={{fontSize:13,color:'#666',marginBottom:16}}>{isEdit?'✏️ แก้ไขออร์เดอร์':'📋 ออร์เดอร์ใหม่'}</div>
      {/* Shop info */}
      <div style={{background:'#161616',border:'1px solid #252525',borderRadius:12,padding:'14px',marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:'#888',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.05em'}}>ข้อมูลร้าน</div>
        <Field label="ชื่อร้าน / ช่าง"><input value={order.shopName} onChange={e=>setField('shopName',e.target.value)} style={inputStyle}/></Field>
        <Field label="ชื่อลูกค้า / คนงาน"><input value={order.workerName} onChange={e=>setField('workerName',e.target.value)} placeholder="ชื่อลูกค้า" style={inputStyle}/></Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Field label="วันที่พิมพ์"><input value={order.date} onChange={e=>setField('date',e.target.value)} placeholder="dd/mm/yy" style={inputStyle}/></Field>
          <Field label="ประเภทแขน">
            <select value={order.sleeveType} onChange={e=>setField('sleeveType',e.target.value)} style={{...inputStyle,appearance:'none'}}>
              <option>แขนยาว</option><option>แขนสั้น</option>
            </select>
          </Field>
        </div>
        <Field label="น้ำหนักผ้า">
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {FABRIC_OPTS.map(f=>(
              <button key={f} onClick={()=>setField('fabric',f)} style={{padding:'6px 12px',borderRadius:20,border:order.fabric===f?'1.5px solid #f59e0b':'1px solid #333',background:order.fabric===f?'rgba(245,158,11,.15)':'transparent',color:order.fabric===f?'#f59e0b':'#888',fontSize:13}}>{f}</button>
            ))}
          </div>
        </Field>
      </div>
      {/* Colors */}
      <div style={{marginBottom:4,fontSize:12,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'0.05em',padding:'0 2px'}}>สีเสื้อ</div>
      {order.colors.map((c,i)=>(
        <ColorCard key={c.id} color={c} idx={i} sleeveType={order.sleeveType}
          onChange={(f,v)=>setColorField(c.id,f,v)}
          onSizeChange={(sz,v)=>setSizeField(c.id,sz,v)}
          onImageUpload={v=>setColorField(c.id,'image',v)}
          onRemove={()=>removeColor(c.id)}
          canRemove={order.colors.length>1}/>
      ))}
      <button style={{...btnStyle('ghost'),width:'100%',marginBottom:16,borderStyle:'dashed',color:'#f59e0b',borderColor:'rgba(245,158,11,.3)'}} onClick={addColor}>+ เพิ่มสี</button>
      {/* Pricing */}
      <div style={{background:'#161616',border:'1px solid #252525',borderRadius:12,padding:'14px',marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:'#888',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.05em'}}>ยอดเงิน</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'#111',borderRadius:8,marginBottom:12}}>
          <span style={{color:'#888',fontSize:14}}>จำนวนเสื้อทั้งหมด</span>
          <span style={{fontSize:20,fontWeight:800,color:'#f59e0b'}}>{tot} ตัว</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Field label="ยอดรวม (บาท)"><input type="number" inputMode="decimal" value={order.totalPrice} onChange={e=>setField('totalPrice',e.target.value)} placeholder="0" style={inputStyle}/></Field>
          <Field label="มัดจำ (บาท)"><input type="number" inputMode="decimal" value={order.deposit} onChange={e=>setField('deposit',e.target.value)} placeholder="0" style={inputStyle}/></Field>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:4}}>
          {[['ยอดรวม',order.totalPrice,'#60a5fa'],['มัดจำ',order.deposit,'#ef4444'],['เหลือยอด',bal,'#22c55e']].map(([label,val,color])=>(
            <div key={label} style={{background:'#111',borderRadius:8,padding:'10px',textAlign:'center'}}>
              <div style={{fontSize:11,color:'#666',marginBottom:3}}>{label}</div>
              <div style={{fontSize:16,fontWeight:700,color}}>{fmtNum(val)}</div>
            </div>
          ))}
        </div>
      </div>
      <Field label="หมายเหตุ">
        <textarea value={order.notes} onChange={e=>setField('notes',e.target.value)} placeholder="หมายเหตุเพิ่มเติม..." rows={2} style={{...inputStyle,resize:'vertical'}}/>
      </Field>
      <button style={btnStyle('accent')} onClick={onSave}>{isEdit?'💾 บันทึกการแก้ไข':'💾 บันทึก + ดูใบออร์เดอร์'}</button>
      <div style={{height:32}}/>
    </div>
  );
}

/* ───── PREVIEW ───── */
function PreviewPage({order,onNew,onEdit,onHistory}){
  const tot=totalShirts(order);
  return(
    <div className="no-print">
      <div style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:10,background:'rgba(34,197,94,.08)',borderBottom:'1px solid rgba(34,197,94,.15)'}}>
        <span style={{fontSize:16}}>✅</span>
        <span style={{color:'#22c55e',fontSize:14,fontWeight:600}}>บันทึกสำเร็จ — {tot} ตัว</span>
      </div>
      <div style={{padding:'16px',maxWidth:600,margin:'0 auto'}}>
        {/* Action buttons */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:20}}>
          <button style={btnStyle('info')} onClick={()=>window.print()}>🖨 พิมพ์</button>
          <button style={btnStyle('default')} onClick={onEdit}>✏️ แก้ไข</button>
          <button style={btnStyle('default')} onClick={onNew}>+ ใหม่</button>
        </div>
        {/* Preview card */}
        <div style={{border:'1px solid #2a2a2a',borderRadius:12,overflow:'hidden'}}>
          <div style={{background:'#1a1a1a',padding:'10px 14px',fontSize:12,color:'#666',borderBottom:'1px solid #222'}}>ตัวอย่างใบออร์เดอร์</div>
          <div style={{background:'#fff',padding:4}}>
            <OrderCard order={order}/>
          </div>
        </div>
        <div style={{height:24}}/>
      </div>
    </div>
  );
}

/* ───── HISTORY ───── */
function HistoryPage({orders,onView,onEdit,onDelete,onNew}){
  const [search,setSearch]=useState('');
  const filtered=orders.filter(o=>{
    const q=search.toLowerCase();
    return !q||o.workerName?.toLowerCase().includes(q)||o.shopName?.toLowerCase().includes(q)||o.date?.includes(q);
  });
  if(orders.length===0)return(
    <div style={{padding:'60px 20px',textAlign:'center',color:'#555'}}>
      <div style={{fontSize:40,marginBottom:16}}>📋</div>
      <div style={{fontSize:16,marginBottom:8}}>ยังไม่มีออร์เดอร์</div>
      <div style={{fontSize:13,color:'#444',marginBottom:20}}>กดปุ่ม + สร้าง เพื่อเริ่มต้น</div>
      <button style={btnStyle('accent')} onClick={onNew}>+ สร้างออร์เดอร์แรก</button>
    </div>
  );
  return(
    <div style={{padding:'16px',maxWidth:600,margin:'0 auto'}} className="no-print">
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหาชื่อลูกค้า, วันที่..." style={{...inputStyle,marginBottom:16}}/>
      <div style={{fontSize:12,color:'#555',marginBottom:12}}>{filtered.length} ออร์เดอร์</div>
      {filtered.map(o=>{
        const tot=totalShirts(o);
        const bal=balance(o);
        return(
          <div key={o.id} style={{background:'#161616',border:'1px solid #252525',borderRadius:12,padding:'14px',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{o.workerName||'(ไม่มีชื่อลูกค้า)'}</div>
                <div style={{fontSize:12,color:'#666'}}>{o.date} · {o.sleeveType} · {o.fabric}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:16,fontWeight:800,color:'#f59e0b'}}>{tot} ตัว</div>
                <div style={{fontSize:12,color:'#555'}}>{o.colors.length} สี</div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginBottom:10}}>
              {[['ยอด',o.totalPrice,'#60a5fa'],['มัด',o.deposit,'#f87171'],['เหลือ',bal,'#4ade80']].map(([label,val,color])=>(
                <div key={label} style={{flex:1,background:'#111',borderRadius:7,padding:'6px 8px',textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#555',marginBottom:1}}>{label}</div>
                  <div style={{fontSize:13,fontWeight:700,color}}>{fmtNum(val)}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:6}}>
              <button style={{...btnStyle('info'),flex:1,textAlign:'center'}} onClick={()=>onView(o)}>👁 ดูใบ</button>
              <button style={{...btnStyle('default'),flex:1,textAlign:'center'}} onClick={()=>onEdit(o)}>✏️ แก้ไข</button>
              <button style={{...btnStyle('danger'),padding:'10px 12px'}} onClick={()=>onDelete(o.id)}>🗑</button>
            </div>
          </div>
        );
      })}
      <div style={{height:32}}/>
    </div>
  );
}

/* ───── APP ───── */
export default function App(){
  const [page,setPage]=useState('form');
  const [order,setOrder]=useState(newOrder());
  const [editId,setEditId]=useState(null);
  const [orders,setOrders]=useState(loadLS());
  const [viewOrder,setViewOrder]=useState(null);

  function persist(list){setOrders(list);saveLS(list);}
  function handleSave(){
    const saved={...order};
    if(!editId)saved.createdAt=Date.now();
    const list=editId?orders.map(o=>o.id===editId?saved:o):[saved,...orders];
    persist(list);
    setViewOrder(saved);
    setEditId(null);
    setPage('preview');
  }
  function startNew(){setOrder(newOrder());setEditId(null);setPage('form');}
  function startEdit(o){setOrder(o);setEditId(o.id);setPage('form');}
  function handleView(o){setViewOrder(o);setPage('preview');}
  function handleDelete(id){if(confirm('ลบออร์เดอร์นี้?'))persist(orders.filter(o=>o.id!==id));}

  // When nav 'create' is clicked while in preview, go to form
  function handleNavCreate(){
    if(page==='form')return;
    startNew();
  }

  return(
    <>
      <style>{`
        @media print{
          .no-print{display:none!important;}
          .print-only{display:block!important;}
          body{background:#fff!important;}
        }
      `}</style>
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        <Nav page={page} setPage={(p)=>{if(p==='form'){startNew();}else{setPage(p);}}} ordersLen={orders.length}/>
        <div style={{flex:1}}>
          {page==='form'&&<FormPage order={order} setOrder={setOrder} onSave={handleSave} isEdit={!!editId}/>}
          {page==='preview'&&viewOrder&&<PreviewPage order={viewOrder} onNew={startNew} onEdit={()=>startEdit(viewOrder)} onHistory={()=>setPage('history')}/>}
          {page==='history'&&<HistoryPage orders={orders} onView={handleView} onEdit={startEdit} onDelete={handleDelete} onNew={startNew}/>}
        </div>
      </div>
      {/* Print-only content */}
      {viewOrder&&(
        <div className="print-only">
          <OrderCard order={viewOrder}/>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
